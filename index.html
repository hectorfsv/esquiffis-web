<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ESQUIFFIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg-void: #080808;
      --bg-surface: #111111;
      --bg-elevated: #1a1a1a;
      --border: #1f1f1f;
      --border-bright: #2a2a2a;
      --text-primary: #f0f0f0;
      --text-muted: #3a3a3a;
      --text-dim: #555;
      --red: #cc1a1a;
      --red-bright: #e02020;
      --red-dim: #8a1010;
      --red-glow: rgba(204, 26, 26, 0.12);
      --red-glow-bright: rgba(204, 26, 26, 0.25);
      --gold: #b8952a;
      --code-bg: #0d0d0d;
      --font-display: 'Bebas Neue', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg-void);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ─── NOISE OVERLAY ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── AUTH SCREEN ─── */
    #auth-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      animation: fadeIn 0.6s ease;
    }

    #auth-screen.hidden { display: none; }

    .auth-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--red-glow) 0%, transparent 70%);
      pointer-events: none;
      animation: breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .auth-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 60px 48px;
      z-index: 1;
    }

    .auth-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .auth-diamond {
      width: 28px;
      height: 28px;
      background: var(--red);
      transform: rotate(45deg);
      box-shadow: 0 0 20px var(--red-glow-bright), 0 0 40px var(--red-glow);
    }

    .auth-wordmark {
      font-family: var(--font-display);
      font-size: 72px;
      letter-spacing: 8px;
      color: var(--text-primary);
      line-height: 1;
    }

    .auth-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
    }

    .auth-subtitle {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .auth-input-wrap {
      position: relative;
      width: 280px;
    }

    #password-input {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border-bright);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 15px;
      padding: 14px 48px 14px 18px;
      outline: none;
      letter-spacing: 4px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #password-input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 1px var(--red), 0 0 16px var(--red-glow);
    }

    #password-input.error {
      border-color: var(--red-bright);
      box-shadow: 0 0 0 1px var(--red-bright), 0 0 20px var(--red-glow-bright);
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    #auth-submit {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 48px;
      background: transparent;
      border: none;
      border-left: 1px solid var(--border-bright);
      color: var(--text-dim);
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #auth-submit:hover:not(:disabled) { color: var(--red); background: var(--red-glow); }
    #auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-spinner {
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--text-muted);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #auth-submit.loading .auth-arrow { display: none; }
    #auth-submit.loading .auth-spinner { display: block; }

    .auth-error {
      font-size: 11px;
      color: var(--red-bright);
      letter-spacing: 2px;
      text-transform: uppercase;
      height: 16px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .auth-error.visible { opacity: 1; }

    /* ─── CHAT SCREEN ─── */
    #chat-screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
    }

    #chat-screen.visible { display: flex; }

    /* Header */
    .chat-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 8, 8, 0.95);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-diamond {
      width: 10px;
      height: 10px;
      background: var(--red);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .header-wordmark {
      font-family: var(--font-display);
      font-size: 26px;
      letter-spacing: 4px;
      color: var(--text-primary);
      line-height: 1;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,0.5);
      animation: pulse-green 2s ease-in-out infinite;
    }

    @keyframes pulse-green {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-label {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Messages */
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 32px 0 16px;
      scroll-behavior: smooth;
    }

    .messages-wrap::-webkit-scrollbar { width: 4px; }
    .messages-wrap::-webkit-scrollbar-track { background: transparent; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
    .messages-wrap::-webkit-scrollbar-thumb:hover { background: var(--red-dim); }

    .messages-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 0.8s 0.3s ease forwards;
    }

    .empty-diamond {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border-bright);
      transform: rotate(45deg);
      position: relative;
    }

    .empty-diamond::after {
      content: '';
      position: absolute;
      inset: 6px;
      background: var(--red);
      opacity: 0.3;
    }

    .empty-title {
      font-family: var(--font-display);
      font-size: 36px;
      letter-spacing: 6px;
      color: var(--text-muted);
    }

    .empty-sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 14px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border-bright);
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }

    .user-avatar-letter {
      font-family: var(--font-display);
      font-size: 16px;
      color: var(--red);
      letter-spacing: 0;
    }

    .msg-content {
      flex: 1;
      max-width: 85%;
    }

    .message.user .msg-content { display: flex; justify-content: flex-end; }

    .msg-bubble {
      display: inline-block;
      padding: 14px 18px;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.7;
      max-width: 100%;
    }

    .message.user .msg-bubble {
      background: var(--bg-elevated);
      border: 1px solid var(--border-bright);
      color: var(--text-primary);
      text-align: right;
    }

    .message.agent .msg-bubble {
      background: transparent;
      border-left: 2px solid var(--red);
      padding-left: 16px;
      color: var(--text-primary);
    }

    /* Markdown styles inside agent bubbles */
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
      font-family: var(--font-display);
      letter-spacing: 2px;
      margin: 16px 0 8px;
      color: var(--text-primary);
    }
    .msg-bubble h1 { font-size: 22px; }
    .msg-bubble h2 { font-size: 18px; }
    .msg-bubble h3 { font-size: 15px; color: var(--text-dim); }

    .msg-bubble p { margin: 0 0 10px; }
    .msg-bubble p:last-child { margin-bottom: 0; }

    .msg-bubble ul {
      padding-left: 0;
      margin: 10px 0;
      list-style: none;
    }
    .msg-bubble ul li {
      margin: 6px 0;
      padding-left: 16px;
      position: relative;
    }
    .msg-bubble ul li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--red-dim);
    }

    .msg-bubble ol {
      padding-left: 0;
      margin: 10px 0;
      list-style: none;
      counter-reset: esq-counter;
    }
    .msg-bubble ol li {
      counter-increment: esq-counter;
      display: flex;
      gap: 10px;
      margin: 6px 0;
      align-items: baseline;
    }
    .msg-bubble ol li::before {
      content: counter(esq-counter) ".";
      color: var(--red);
      font-size: 11px;
      letter-spacing: 0.5px;
      min-width: 22px;
      flex-shrink: 0;
      text-align: right;
      opacity: 0.8;
    }

    .msg-bubble strong { color: var(--text-primary); font-weight: 500; }
    .msg-bubble em { color: var(--gold); font-style: italic; }

    .msg-bubble a {
      color: var(--red-bright);
      text-decoration: none;
      border-bottom: 1px solid var(--red-dim);
    }
    .msg-bubble a:hover { color: var(--text-primary); }

    .msg-bubble code {
      background: var(--code-bg);
      border: 1px solid var(--border-bright);
      padding: 1px 6px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--gold);
    }

    .msg-bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .msg-bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: var(--text-primary);
      font-size: 13px;
    }

    .msg-bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0;
      animation: slideUp 0.3s ease;
    }

    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 16px 18px;
      border-left: 2px solid var(--red);
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      background: var(--red);
      border-radius: 50%;
      animation: dot-pulse 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-pulse {
      0%, 60%, 100% { opacity: 0.2; transform: scale(1); }
      30% { opacity: 1; transform: scale(1.3); }
    }

    /* Input area */
    .input-area {
      flex-shrink: 0;
      padding: 16px 24px 24px;
      background: rgba(8, 8, 8, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: 0;
      border: 1px solid var(--border-bright);
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--bg-surface);
    }

    .input-wrap:focus-within {
      border-color: var(--red);
      box-shadow: 0 0 0 1px var(--red), 0 0 20px var(--red-glow);
    }

    #message-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      padding: 14px 16px;
      resize: none;
      outline: none;
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    #message-input::placeholder { color: var(--text-muted); letter-spacing: 1px; }

    #send-btn {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      background: transparent;
      border: none;
      border-left: 1px solid var(--border-bright);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, background 0.2s;
      align-self: stretch;
    }

    #send-btn:hover:not(:disabled) { color: var(--red); background: var(--red-glow); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .input-hint {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      margin-top: 8px;
      text-transform: uppercase;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ─── MOBILE ─── */
    @media (max-width: 640px) {
      /* Use --app-height (set by JS) so the layout tracks the visual
         viewport when the soft keyboard opens. Override bottom: auto so
         height wins over the inset: 0 shorthand. */
      #auth-screen, #chat-screen {
        bottom: auto;
        height: var(--app-height, 100svh);
      }
      /* Auth screen */
      .auth-glow { width: 260px; height: 260px; }
      .auth-card { padding: 40px 24px; gap: 24px; }
      .auth-wordmark { font-size: 52px; letter-spacing: 5px; }
      .auth-input-wrap { width: min(300px, 82vw); }
      /* 16px min prevents iOS Safari from zooming on input focus */
      #password-input { font-size: 16px; letter-spacing: 3px; }

      /* Header */
      .chat-header { padding: 0 16px; height: 50px; }
      .header-wordmark { font-size: 21px; letter-spacing: 3px; }
      .header-diamond { width: 8px; height: 8px; }

      /* Messages */
      .messages-wrap { padding: 16px 0 8px; }
      .messages-inner { padding: 0 12px; gap: 16px; }
      .message { gap: 10px; }
      .msg-content { max-width: 90%; }
      .msg-avatar { width: 28px; height: 28px; }
      .user-avatar-letter { font-size: 13px; }
      .msg-bubble { font-size: 14px; padding: 11px 13px; }
      .msg-bubble h1 { font-size: 19px; }
      .msg-bubble h2 { font-size: 16px; }
      .msg-bubble pre { padding: 12px; }

      /* Empty state */
      .empty-title { font-size: 26px; letter-spacing: 4px; }
      .empty-diamond { width: 32px; height: 32px; }

      /* Input — safe-area-inset-bottom handles iPhone home bar */
      .input-area {
        padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      }
      /* 16px prevents iOS zoom on textarea focus */
      #message-input { font-size: 16px; padding: 12px 14px; }
      #send-btn { width: 44px; height: 44px; }
      /* "Enter to send" hint irrelevant on soft keyboard */
      .input-hint { display: none; }
    }
  </style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="auth-glow"></div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-diamond"></div>
        <div class="auth-wordmark">ESQUIFFIS</div>
        <div class="auth-line"></div>
        <div class="auth-subtitle">Secure Access</div>
      </div>
      <div class="auth-input-wrap">
        <input type="password" id="password-input" placeholder="••••••••••" autocomplete="current-password" autofocus>
        <button id="auth-submit"><span class="auth-arrow">→</span><span class="auth-spinner"></span></button>
      </div>
      <div class="auth-error" id="auth-error">ACCESS DENIED</div>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen">
    <header class="chat-header">
      <div class="header-left">
        <div class="header-diamond"></div>
        <span class="header-wordmark">ESQUIFFIS</span>
      </div>
      <div class="header-right">
        <div class="status-dot"></div>
        <span class="status-label">Online</span>
      </div>
    </header>

    <div class="messages-wrap" id="messages-wrap">
      <div class="messages-inner" id="messages-inner">
        <div class="empty-state" id="empty-state">
          <div class="empty-diamond"></div>
          <div class="empty-title">WHAT DO YOU NEED?</div>
          <div class="empty-sub">Grok 4.20 · All tools active</div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="message-input" placeholder="Ask anything..." rows="1" enterkeyhint="send"></textarea>
        <button id="send-btn" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

  <script>
    // ─── CONFIG ───
    const API_URL = 'https://hectorfsv.app.n8n.cloud/webhook/esquiffis-chat';
    const AVATAR_SRC = 'data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAASABIAAD/4QKORXhpZgAATU0AKgAAAAgAAwEOAAIAAAD4AAAAMgE7AAIAAAAlAAABKodpAAQAAAABAAABUAAAAABTaWduYXR1cmU6IGtXZE80dnBHUHNpZkdEZm9FcExNMGNrbFdpem9GOExEclgxYTFlMHZLdlhia1JtRUl5K2xjZlZqb0x0RFN0SEV2YmlSSHpYN0JpdTJhRy9wRjBSdFpMcjRIYVY5ckxDSmJMbVVxQ3cvQzdka0JUNXdmTklNR005QzJhMW40UUdyK3BidWhDRWV6WDFOSnJCS3ZuT3RLL1R3V1ZUbDVsYVViMjZpS3l5L2psVjdzQTZjbitxM2hvL3kwSmFtUysvaWJvamlhMHRPOFh0Qys0L3VzazNEM1MydVpKMFhONmRybTduMHJPQ09vclU9AGNhZTYyMWY4LTVmN2QtNGFhNC1iZDMwLTI0YzFhMGE5NWI0NgAAAASShgAHAAAA/wAAAYagAQADAAAAAQABAACgAgAEAAAAAQAAACqgAwAEAAAAAQAAAFAAAAAAQVNDSUkAAABTaWduYXR1cmU6IGtXZE80dnBHUHNpZkdEZm9FcExNMGNrbFdpem9GOExEclgxYTFlMHZLdlhia1JtRUl5K2xjZlZqb0x0RFN0SEV2YmlSSHpYN0JpdTJhRy9wRjBSdFpMcjRIYVY5ckxDSmJMbVVxQ3cvQzdka0JUNXdmTklNR005QzJhMW40UUdyK3BidWhDRWV6WDFOSnJCS3ZuT3RLL1R3V1ZUbDVsYVViMjZpS3l5L2psVjdzQTZjbitxM2hvL3kwSmFtUysvaWJvamlhMHRPOFh0Qys0L3VzazNEM1MydVpKMFhONmRybTduMHJPQ09vclU9AP/tADhQaG90b3Nob3AgMy4wADhCSU0EBAAAAAAAADhCSU0EJQAAAAAAENQdjNmPALIE6YAJmOz4Qn7/wAARCABQACoDASIAAhEBAxEB/8QAHwAAAQUBAQEBAQEAAAAAAAAAAAECAwQFBgcICQoL/8QAtRAAAgEDAwIEAwUFBAQAAAF9AQIDAAQRBRIhMUEGE1FhByJxFDKBkaEII0KxwRVS0fAkM2JyggkKFhcYGRolJicoKSo0NTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uHi4+Tl5ufo6erx8vP09fb3+Pn6/8QAHwEAAwEBAQEBAQEBAQAAAAAAAAECAwQFBgcICQoL/8QAtREAAgECBAQDBAcFBAQAAQJ3AAECAxEEBSExBhJBUQdhcRMiMoEIFEKRobHBCSMzUvAVYnLRChYkNOEl8RcYGRomJygpKjU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6goOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4uPk5ebn6Onq8vP09fb3+Pn6/9sAQwACAgICAgIDAgIDBQMDAwUGBQUFBQYIBgYGBgYICggICAgICAoKCgoKCgoKDAwMDAwMDg4ODg4PDw8PDw8PDw8P/9sAQwECAgIEBAQHBAQHEAsJCxAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQ/90ABAAD/9oADAMBAAIRAxEAPwD+f+iiigAooooAKKUqw5IpKAP/0P5/6KKKACtCxtDcPgVTiTzHCk4HfvXsvwv8Cap418VaV4W0SIz3mq3EcEK9t0jADJ9B1J7CoqTUU2zrwWFlWqxpQ3Zgal4K1TTtFtNau7SSK0vt4glZSEkMeA+0ng7SRnHSuDMKg     // ─── STATE ───
    let isLoading = false;
    let sessionId = sessionStorage.getItem('esq_session') || (() => {
      const id = 'web-' + Math.random().toString(36).substr(2, 9);
      sessionStorage.setItem('esq_session', id);
      return id;
    })();

    // ─── DOM ───
    const authScreen   = document.getElementById('auth-screen');
    const chatScreen   = document.getElementById('chat-screen');
    const passwordInput = document.getElementById('password-input');
    const authSubmit   = document.getElementById('auth-submit');
    const authError    = document.getElementById('auth-error');
    const messagesWrap = document.getElementById('messages-wrap');
    const messagesInner = document.getElementById('messages-inner');
    const emptyState   = document.getElementById('empty-state');
    const messageInput = document.getElementById('message-input');
    const sendBtn      = document.getElementById('send-btn');

    // ─── MARKED CONFIG ───
    marked.setOptions({ breaks: true, gfm: true });

    // ─── AUTH ───
    const savedPwd = sessionStorage.getItem('esq_password');
    if (savedPwd) enterChat();

    function showAuthError() {
      passwordInput.classList.add('error');
      authError.classList.add('visible');
      setTimeout(() => {
        passwordInput.classList.remove('error');
        passwordInput.value = '';
        passwordInput.focus();
      }, 1000);
    }

    async function tryAuth() {
      const pwd = passwordInput.value.trim();
      if (!pwd) return;
      authSubmit.disabled = true;
      authSubmit.classList.add('loading');
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: '__auth_check__', password: pwd, session_id: sessionId })
        });
        if (res.ok) {
          sessionStorage.setItem('esq_password', pwd);
          enterChat();
        } else {
          showAuthError();
        }
      } catch (e) {
        showAuthError();
      } finally {
        authSubmit.disabled = false;
        authSubmit.classList.remove('loading');
      }
    }

    function enterChat() {
      authScreen.classList.add('hidden');
      chatScreen.classList.add('visible');
      setTimeout(() => messageInput.focus(), 100);
    }

    authSubmit.addEventListener('click', tryAuth);
    passwordInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); tryAuth(); }
    });
    passwordInput.addEventListener('input', () => {
      authError.classList.remove('visible');
      passwordInput.classList.remove('error');
    });

    // ─── MESSAGES ───
    function addMessage(role, html) {
      emptyState.style.display = 'none';
      const wrap = document.createElement('div');
      wrap.className = `message ${role}`;

      const avatarEl = document.createElement('div');
      avatarEl.className = 'msg-avatar';

      if (role === 'agent') {
        const img = document.createElement('img');
        img.src = AVATAR_SRC;
        img.alt = 'Esquiffis';
        avatarEl.appendChild(img);
      } else {
        avatarEl.innerHTML = '<span class="user-avatar-letter">H</span>';
      }

      const content = document.createElement('div');
      content.className = 'msg-content';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      if (role === 'agent') {
        bubble.innerHTML = html;
        bubble.querySelectorAll('pre code').forEach(block => {
          hljs.highlightElement(block);
        });
      } else {
        bubble.textContent = html;
      }

      content.appendChild(bubble);
      wrap.appendChild(avatarEl);
      wrap.appendChild(content);
      messagesInner.appendChild(wrap);
      scrollToBottom();
      return wrap;
    }

    function addTyping() {
      emptyState.style.display = 'none';
      const wrap = document.createElement('div');
      wrap.className = 'typing-indicator';
      wrap.id = 'typing-indicator';

      const avatarEl = document.createElement('div');
      avatarEl.className = 'msg-avatar';
      const img = document.createElement('img');
      img.src = AVATAR_SRC;
      img.alt = 'Esquiffis';
      avatarEl.appendChild(img);

      const dots = document.createElement('div');
      dots.className = 'typing-dots';
      for (let i = 0; i < 3; i++) {
        const d = document.createElement('div');
        d.className = 'typing-dot';
        dots.appendChild(d);
      }

      wrap.appendChild(avatarEl);
      wrap.appendChild(dots);
      messagesInner.appendChild(wrap);
      scrollToBottom();
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messagesWrap.scrollTop = messagesWrap.scrollHeight;
      });
    }

    // ─── SEND ───
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || isLoading) return;

      const pwd = sessionStorage.getItem('esq_password');
      if (!pwd) { enterAuth(); return; }

      isLoading = true;
      sendBtn.disabled = true;
      messageInput.value = '';
      messageInput.style.height = 'auto';

      addMessage('user', text);
      addTyping();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, password: pwd, session_id: sessionId })
        });

        removeTyping();

        if (res.status === 401) {
          sessionStorage.removeItem('esq_password');
          addMessage('agent', marked.parse('_Session expired. Refresh the page to log in again._'));
          return;
        }

        if (!res.ok) {
          addMessage('agent', marked.parse('_Something went wrong. Check the n8n workflow._'));
          return;
        }

        const data = await res.json();
        const reply = data.response || data.output || data.message || '_No response_';
        addMessage('agent', marked.parse(reply));

      } catch (e) {
        removeTyping();
        addMessage('agent', marked.parse('_Network error. Make sure n8n is running._'));
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    // ─── INPUT AUTO-RESIZE ───
    messageInput.addEventListener('input', () => {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 180) + 'px';
    });

    messageInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    // iOS soft keyboard fires keydown unreliably — keyup as fallback
    messageInput.addEventListener('keyup', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // ─── iOS KEYBOARD FIX ───
    // Sets --app-height CSS var to the visual viewport height so the
    // layout shrinks correctly when the soft keyboard opens.
    // bottom: auto in CSS lets height win over inset: 0's bottom: 0.
    function updateAppHeight() {
      const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      document.documentElement.style.setProperty('--app-height', h + 'px');
    }
    updateAppHeight();
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', () => {
        updateAppHeight();
        scrollToBottom();
      });
    }
  </script>
